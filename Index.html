<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>플랜 B+ 3D 뷰어</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#1a0f08;font-family:'Noto Sans KR',sans-serif;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}

#ui{
  position:fixed;top:0;left:0;right:0;
  padding:10px 14px 8px;
  background:linear-gradient(to bottom,rgba(20,10,4,.95) 70%,transparent);
  z-index:10;pointer-events:none;
}
#ui h1{color:#F2E4CC;font-size:clamp(.8rem,3.5vw,1.1rem);font-weight:700;}
#ui p{color:#B07840;font-size:clamp(.6rem,2.5vw,.75rem);margin-top:2px;}

.btns{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:10;
}
.btn{
  padding:9px 18px;border-radius:24px;border:1.5px solid #B07840;
  background:rgba(176,120,64,.2);color:#F2E4CC;
  font-size:clamp(.7rem,3vw,.8rem);font-weight:700;
  cursor:pointer;backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:all .2s;white-space:nowrap;
}
.btn.active{background:#B07840;color:white;}

#mode-label{
  position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:#B07840;color:white;font-size:clamp(.65rem,2.8vw,.8rem);font-weight:700;
  padding:5px 16px;border-radius:20px;z-index:10;white-space:nowrap;
}

#hint{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(20,10,4,.75);border:1px solid #3D1F0F;
  border-radius:10px;padding:7px 16px;z-index:10;
  color:#888;font-size:clamp(.6rem,2.5vw,.7rem);
  text-align:center;white-space:nowrap;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}

#legend{
  position:fixed;top:50%;right:10px;transform:translateY(-50%);
  background:rgba(20,10,4,.82);border:1px solid #3D1F0F;
  border-radius:10px;padding:8px 10px;z-index:10;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#legend h4{color:#B07840;font-size:.6rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.leg{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.lc{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.lt{color:#E8DBC4;font-size:.6rem;}

@media(max-width:480px){
  #legend{display:none;}
}
</style>
</head>
<body>
<div id="ui">
  <h1>플랜 B+  로스터리 멀티공간  3D</h1>
  <p>15평 · 전면 중앙-좌측 양문 · 후면 우측 로비 출입문</p>
</div>
<div id="mode-label">평일 모드 — 카페 영업 (12~14석)</div>

<div id="legend">
  <h4>범례</h4>
  <div class="leg"><div class="lc" style="background:#5C3317"></div><div class="lt">로스터 쇼룸</div></div>
  <div class="leg"><div class="lc" style="background:#C8915A"></div><div class="lt">바 카운터</div></div>
  <div class="leg"><div class="lc" style="background:#D4B896"></div><div class="lt">좌석/테이블</div></div>
  <div class="leg"><div class="lc" style="background:#8B6914"></div><div class="lt">커핑/교육존</div></div>
  <div class="leg"><div class="lc" style="background:#4A5C3A"></div><div class="lt">작업실</div></div>
  <div class="leg"><div class="lc" style="background:#888"></div><div class="lt">창고/화장실</div></div>
</div>

<div class="btns">
  <button class="btn active" id="btn-weekday" onclick="setMode('weekday')">☕ 평일 카페</button>
  <button class="btn" id="btn-weekend" onclick="setMode('weekend')">🎓 주말 세미나</button>
  <button class="btn" onclick="resetCamera()">🔄 초기화</button>
</div>
<div id="hint">👆 한 손가락: 회전 &nbsp;|&nbsp; 두 손가락: 줌 &nbsp;|&nbsp; 🖱 드래그/휠</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f08);
scene.fog = new THREE.FogExp2(0x1a0f08, 0.016);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 500);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff4e0, 0.6));
const sun = new THREE.DirectionalLight(0xfff8f0, 1.2);
sun.position.set(15,30,20); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
['left','right','top','bottom'].forEach((s,i)=>sun.shadow.camera[s]=[-25,25,25,-25][i]);
scene.add(sun);
const fill = new THREE.PointLight(0xC8915A, 0.9, 40);
fill.position.set(-5,8,-3); scene.add(fill);
const roasterGlow = new THREE.PointLight(0xFF6600, 1.4, 14);
roasterGlow.position.set(-8,2,-6); scene.add(roasterGlow);
const barGlow = new THREE.PointLight(0xFFAA44, 0.7, 5);
barGlow.position.set(-0.6, 1.8, 4.6); scene.add(barGlow);

// ── Camera state ──
let theta=0.5, phi=0.9, radius=32, panX=0, panY=0;
const TARGET = {x:0,y:1,z:0};

function updateCamera(){
  camera.position.set(
    TARGET.x+panX + radius*Math.sin(phi)*Math.sin(theta),
    TARGET.y+panY + radius*Math.cos(phi),
    TARGET.z      + radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(TARGET.x+panX, TARGET.y+panY, TARGET.z);
}
updateCamera();

// ── Touch / Mouse Unified Controls ──
const pointer = {
  down:false, right:false,
  prevX:0, prevY:0,
  // pinch
  pinching:false, prevDist:0,
  // two-finger pan
  prevMidX:0, prevMidY:0
};

function dist2(t1,t2){
  return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY);
}
function mid2(t1,t2){
  return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2};
}

// TOUCH
renderer.domElement.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1){
    pointer.down=true; pointer.pinching=false;
    pointer.prevX=e.touches[0].clientX;
    pointer.prevY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    pointer.down=false; pointer.pinching=true;
    pointer.prevDist=dist2(e.touches[0],e.touches[1]);
    const m=mid2(e.touches[0],e.touches[1]);
    pointer.prevMidX=m.x; pointer.prevMidY=m.y;
  }
},{passive:false});

renderer.domElement.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1 && pointer.down && !pointer.pinching){
    const dx=e.touches[0].clientX-pointer.prevX;
    const dy=e.touches[0].clientY-pointer.prevY;
    theta -= dx*0.007;
    phi = Math.max(0.12, Math.min(1.52, phi+dy*0.007));
    pointer.prevX=e.touches[0].clientX;
    pointer.prevY=e.touches[0].clientY;
    updateCamera();
  } else if(e.touches.length===2 && pointer.pinching){
    // pinch zoom
    const d=dist2(e.touches[0],e.touches[1]);
    const scale=pointer.prevDist/d;
    radius=Math.max(7, Math.min(60, radius*scale));
    pointer.prevDist=d;
    // two-finger pan
    const m=mid2(e.touches[0],e.touches[1]);
    const dx=m.x-pointer.prevMidX;
    const dy=m.y-pointer.prevMidY;
    panX -= dx*0.025;
    panY += dy*0.025;
    pointer.prevMidX=m.x; pointer.prevMidY=m.y;
    updateCamera();
  }
},{passive:false});

renderer.domElement.addEventListener('touchend', e=>{
  if(e.touches.length===0){ pointer.down=false; pointer.pinching=false; }
  else if(e.touches.length===1){ pointer.pinching=false; pointer.down=true;
    pointer.prevX=e.touches[0].clientX; pointer.prevY=e.touches[0].clientY;
  }
},{passive:false});

// MOUSE
renderer.domElement.addEventListener('mousedown', e=>{
  pointer.down=true; pointer.right=(e.button===2);
  pointer.prevX=e.clientX; pointer.prevY=e.clientY;
});
window.addEventListener('mouseup',()=>pointer.down=false);
window.addEventListener('mousemove', e=>{
  if(!pointer.down) return;
  const dx=e.clientX-pointer.prevX, dy=e.clientY-pointer.prevY;
  if(!pointer.right){
    theta-=dx*0.007;
    phi=Math.max(0.12,Math.min(1.52,phi+dy*0.007));
  } else {
    panX-=dx*0.03; panY+=dy*0.03;
  }
  pointer.prevX=e.clientX; pointer.prevY=e.clientY;
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e=>{
  radius=Math.max(7,Math.min(60,radius+e.deltaY*0.05));
  updateCamera();
},{passive:true});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

function resetCamera(){theta=0.5;phi=0.9;radius=32;panX=0;panY=0;updateCamera();}

// ── Geometry helpers ──
const mats={
  floor:   new THREE.MeshLambertMaterial({color:0xC8A870}),
  wall:    new THREE.MeshLambertMaterial({color:0xF5ECD7,side:THREE.DoubleSide}),
  roaster: new THREE.MeshLambertMaterial({color:0x5C3317}),
  bar:     new THREE.MeshLambertMaterial({color:0xC8915A}),
  counter: new THREE.MeshLambertMaterial({color:0xA0722A}),
  seat:    new THREE.MeshLambertMaterial({color:0xE8DBC4}),
  seatDark:new THREE.MeshLambertMaterial({color:0x8B6914}),
  table:   new THREE.MeshLambertMaterial({color:0xD4B896}),
  tableLeg:new THREE.MeshLambertMaterial({color:0x7A5C2A}),
  cupping: new THREE.MeshLambertMaterial({color:0xB8962A}),
  workshop:new THREE.MeshLambertMaterial({color:0x4A5C3A}),
  storage: new THREE.MeshLambertMaterial({color:0x888888}),
  machine: new THREE.MeshLambertMaterial({color:0x2C1810}),
  glass:   new THREE.MeshLambertMaterial({color:0xaaddff,transparent:true,opacity:0.22,side:THREE.DoubleSide}),
  doorF:   new THREE.MeshLambertMaterial({color:0x4A7C59}),
  doorB:   new THREE.MeshLambertMaterial({color:0x8B4513}),
  screen:  new THREE.MeshLambertMaterial({color:0x2A4C2E}),
  metal:   new THREE.MeshLambertMaterial({color:0xC8915A}),
  ceil:    new THREE.MeshLambertMaterial({color:0xFAF6EF,transparent:true,opacity:0.12,side:THREE.DoubleSide}),
  semTab:  new THREE.MeshLambertMaterial({color:0xC8A878}),
  chair:   new THREE.MeshLambertMaterial({color:0xC8915A}),
  fold:    new THREE.MeshLambertMaterial({color:0x3D1F0F,transparent:true,opacity:0.75}),
  jar:     new THREE.MeshLambertMaterial({color:0xD4A060}),
  bag:     new THREE.MeshLambertMaterial({color:0xA0845A}),
};

function B(w,h,d,mat,x,y,z,s=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  if(s){m.castShadow=true;m.receiveShadow=true;}
  return m;
}
function C(rt,rb,h,seg,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;return m;
}
function add(g,...items){items.forEach(i=>g.add(i));}

const RW=14.4,RD=14.4,WH=3.2;
const room=new THREE.Group(), weekday=new THREE.Group(), weekend=new THREE.Group();
scene.add(room,weekday,weekend);

// ── ROOM ──
const floor=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD),mats.floor);
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; room.add(floor);
const grid=new THREE.GridHelper(RW,14,0xC8A878,0xC8A878);
grid.position.y=0.01; grid.material.opacity=0.12; grid.material.transparent=true; room.add(grid);

// Walls
function wall(w,h,d,x,y,z,ry=0){const m=B(w,h,d,mats.wall,x,y,z);m.rotation.y=ry;room.add(m);}
const wt=0.16;
wall(RW,WH,wt,   0,WH/2,-RD/2);            // back
wall(3.4,WH,wt, -5.3,WH/2,RD/2);           // front left
wall(4.0,WH,wt,  5.2,WH/2,RD/2);           // front right
room.add(B(2.7,WH*.85,wt*2,mats.doorF,-1.4,WH*.425,RD/2));  // front door
wall(wt,WH,RD,  -RW/2,WH/2,0);             // left
wall(wt,WH,RD,   RW/2,WH/2,0);             // right
room.add(B(2.7,WH*.85,wt*2,mats.doorB, 4.0,WH*.425,-RD/2)); // back door
room.add(B(RW,wt,RD,mats.ceil,0,WH,0,false)); // ceiling

// ── ROASTER SHOWROOM ──
room.add(B(3.8,WH,3.8,mats.roaster,-5.3,WH/2,5.3));
room.add(B(3.8,WH,.05,mats.glass,-5.3,WH/2,3.4));
room.add(C(.7,.8,1.4,16,mats.metal,-5.3,1.5,5.2));
room.add(C(.3,.7,.3,16,mats.machine,-5.3,2.25,5.2));
room.add(C(.1,.1,1.5,8,mats.machine,-4.7,2.5,5.2));

// ── BAR COUNTER ──
room.add(B(7.5,.12,1.5,mats.bar,   2.0,1.05,4.8));
room.add(B(7.5,1.05,1.4,mats.counter,2.0,.525,4.8));
room.add(B(.8,.6,.5,mats.machine,  -.6,1.45,4.6));
room.add(C(.18,.22,.7,12,mats.machine,.4,1.55,4.6));
room.add(B(.5,.35,.4,mats.machine, 1.3,1.35,4.65));
room.add(B(.3,.35,.05,mats.machine,2.5,1.35,4.15));

// ORDER/PICKUP
room.add(B(2.0,1.0,1.0,mats.counter,-2.8,.5,3.6));
room.add(B(2.0,.08,1.0,mats.bar,-2.8,1.04,3.6));
room.add(B(.3,.35,.05,mats.machine,-2.8,1.35,3.15));

// WORKSHOP
room.add(B(.1,WH,2.0,mats.workshop,.5,WH/2,3.6));
room.add(B(2.0,.05,1.2,mats.workshop,1.5,.85,3.5));
room.add(B(2.0,.85,1.2,new THREE.MeshLambertMaterial({color:0x3A4A2A}),1.5,.42,3.5));
room.add(B(.5,.3,.4,mats.machine,1.2,1.05,3.4));

// STORAGE
room.add(B(2.0,WH*.7,1.8,mats.storage,4.5,WH*.35,4.0));
for(let i=0;i<3;i++) room.add(B(.5,.5,.4,mats.bag,4.0+i*.55,.35,4.2));

// BATHROOM
room.add(B(.1,WH,2.4,mats.wall,RW/2-2.0,WH/2,2.8));
room.add(B(2.2,WH,.1,mats.wall,RW/2-1.0,WH/2,1.6));

// FOLDING DOOR LINE
room.add(B(RW-.5,.06,.06,new THREE.MeshLambertMaterial({color:0xC8915A}),0,.03,1.2));

// PROJECTOR SCREEN
room.add(B(5.5,2.2,.04,mats.screen,-1.0,2.1,RD/2-.15));
room.add(B(.4,.15,.3,mats.machine,-1.0,WH-.2,1.8));

// GOODS SHELF
room.add(B(3.8,.9,.5,mats.counter,-3.0,.45,-RD/2+.6));
room.add(B(3.8,.06,.5,mats.bar,-3.0,.93,-RD/2+.6));
for(let i=0;i<5;i++) room.add(C(.12,.12,.25,12,mats.jar,-4.2+i*.75,1.08,-RD/2+.6));
room.add(B(1.8,.85,.5,mats.storage,.5,.42,-RD/2+.6));

// ── CHAIR helper ──
function makeChair(x,z,ry=0){
  const g=new THREE.Group();
  g.add(B(.5,.05,.5,mats.seatDark,0,.47,0));
  g.add(B(.5,.5,.05,mats.seatDark,0,.72,-.22));
  [[.2,.2],[.2,-.2],[-.2,.2],[-.2,-.2]].forEach(([lx,lz])=>g.add(B(.05,.45,.05,mats.machine,lx,.22,lz)));
  g.position.set(x,0,z); g.rotation.y=ry; return g;
}
function makeTable2(x,z){
  const g=new THREE.Group();
  g.add(B(1.0,.06,.7,mats.table,0,.74,0));
  [[.4,.28],[.4,-.28],[-.4,.28],[-.4,-.28]].forEach(([lx,lz])=>g.add(B(.05,.74,.05,mats.tableLeg,lx,.37,lz)));
  g.add(makeChair(0,.65)); g.add(makeChair(0,-.65));
  g.position.set(x,0,z); return g;
}
function makeTable4(x,z){
  const g=new THREE.Group();
  g.add(B(1.4,.06,1.0,mats.table,0,.74,0));
  [[.6,.42],[.6,-.42],[-.6,.42],[-.6,-.42]].forEach(([lx,lz])=>g.add(B(.06,.74,.06,mats.tableLeg,lx,.37,lz)));
  g.add(makeChair(0,.85)); g.add(makeChair(0,-.85));
  g.add(makeChair(.9,0,Math.PI*.5)); g.add(makeChair(-.9,0,Math.PI*.5));
  g.position.set(x,0,z); return g;
}

// WEEKDAY
weekday.add(makeTable2(-5.2,-.5));
weekday.add(makeTable2(-5.2,-2.4));
weekday.add(makeTable2(-5.2,-4.2));
weekday.add(makeTable4(-2.2,-1.2));
weekday.add(makeTable4(-2.2,-3.8));
// Cupping zone
weekday.add(B(2.8,.08,3.8,mats.cupping,1.8,.75,-2.2));
[[.8,.8],[.8,-.8],[1.8,.8],[1.8,-.8],[-.2,.8],[-.2,-.8]].forEach(([lx,lz])=>
  weekday.add(B(.06,.75,.06,mats.tableLeg,lx,.375,-2.2+lz)));
for(let i=-1;i<=1;i++){
  weekday.add(C(.18,.18,.05,12,mats.seatDark,.4+i*.7,.82,-.1));
  weekday.add(C(.04,.04,.8,8,mats.machine,.4+i*.7,.4,-.1));
}

// WEEKEND
function semTable(x,z){
  const g=new THREE.Group();
  g.add(B(5.5,.08,1.0,mats.semTab,0,.78,0));
  [[-2.4,.4],[-2.4,-.4],[0,.4],[0,-.4],[2.4,.4],[2.4,-.4]].forEach(([lx,lz])=>
    g.add(B(.06,.78,.06,mats.tableLeg,lx,.39,lz)));
  g.position.set(x,0,z); return g;
}
function chairRow(z,n=10){
  const g=new THREE.Group();
  for(let i=0;i<n;i++){
    const cx=-4.5+i*1.0;
    g.add(B(.42,.04,.42,mats.chair,cx,.47,0));
    g.add(B(.42,.4,.04,mats.chair,cx,.69,-.18));
    [[-.17,.17],[.17,.17],[-.17,-.17],[.17,-.17]].forEach(([lx,lz])=>
      g.add(B(.04,.47,.04,mats.machine,cx+lx,.235,lz)));
  }
  g.position.z=z; return g;
}
weekend.add(semTable(0,-.5));
weekend.add(semTable(0,-3.2));
weekend.add(chairRow(-1.55));
weekend.add(chairRow(-4.35));
// podium
weekend.add(B(1.0,1.1,.6,mats.counter,0,.55,.6));
weekend.add(B(1.0,.05,.6,mats.bar,0,1.12,.6));
// folding wall
weekend.add(B(RW-.5,WH*.92,.12,mats.fold,0,WH*.46,1.2));

weekend.visible=false;

// ── MODE ──
function setMode(mode){
  document.getElementById('btn-weekday').classList.toggle('active',mode==='weekday');
  document.getElementById('btn-weekend').classList.toggle('active',mode==='weekend');
  weekday.visible=mode==='weekday';
  weekend.visible=mode==='weekend';
  const lbl=document.getElementById('mode-label');
  if(mode==='weekday'){
    lbl.textContent='평일 모드 — 카페 영업 (12~14석)';
    lbl.style.background='#B07840';
  } else {
    lbl.textContent='주말 모드 — 세미나 · 모임 (최대 20인)';
    lbl.style.background='#3A5C3E';
  }
}

// ── ANIMATE ──
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.016;
  roasterGlow.intensity=1.1+.45*Math.sin(t*1.8);
  barGlow.intensity=.6+.2*Math.sin(t*2.7);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
